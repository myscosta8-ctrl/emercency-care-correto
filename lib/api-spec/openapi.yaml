openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: UPA Patient Management API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: patients
    description: Patient operations
  - name: staff
    description: Staff management operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /patients:
    get:
      operationId: listPatients
      tags: [patients]
      summary: List all patients
      responses:
        "200":
          description: List of patients
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Patient"
    post:
      operationId: createPatient
      tags: [patients]
      summary: Create a new patient
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePatientBody"
      responses:
        "201":
          description: Created patient
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Patient"

  /patients/summary:
    get:
      operationId: getPatientsSummary
      tags: [patients]
      summary: Get dashboard summary counts by Manchester triage
      responses:
        "200":
          description: Patient summary stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PatientsSummary"

  /patients/{id}:
    get:
      operationId: getPatient
      tags: [patients]
      summary: Get a single patient
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Patient
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Patient"
        "404":
          description: Not found
    put:
      operationId: updatePatient
      tags: [patients]
      summary: Update a patient
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePatientBody"
      responses:
        "200":
          description: Updated patient
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Patient"
        "404":
          description: Not found
    delete:
      operationId: deletePatient
      tags: [patients]
      summary: Delete a patient
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /patients/{id}/status:
    patch:
      operationId: updatePatientStatus
      tags: [patients]
      summary: Quickly update only the patient triage status
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdatePatientStatusBody"
      responses:
        "200":
          description: Updated patient
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Patient"
        "404":
          description: Not found

  /patients/{id}/vitals:
    post:
      operationId: addVitals
      tags: [patients]
      summary: Update patient vitals and log evolution entry
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VitalsUpdateBody"
      responses:
        "200":
          description: Updated patient
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Patient"
        "404":
          description: Not found

  /patients/{id}/prescriptions:
    get:
      operationId: getPatientPrescriptions
      tags: [patients]
      summary: Get patient prescriptions
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Prescription list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PatientPrescription"
    post:
      operationId: createPatientPrescription
      tags: [patients]
      summary: Create a nursing prescription
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePrescriptionBody"
      responses:
        "201":
          description: Prescription created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PatientPrescription"

  /patients/{id}/prescriptions/{prescriptionId}:
    patch:
      operationId: updatePrescriptionStatus
      tags: [patients]
      summary: Update prescription status
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: prescriptionId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdatePrescriptionStatusBody"
      responses:
        "200":
          description: Prescription updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PatientPrescription"

  /patients/{id}/tasks:
    get:
      operationId: getPatientTasks
      tags: [patients]
      summary: Get patient pending tasks
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Task list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PatientTask"
    post:
      operationId: createPatientTask
      tags: [patients]
      summary: Create a pending task
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTaskBody"
      responses:
        "201":
          description: Task created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PatientTask"

  /patients/{id}/tasks/{taskId}:
    patch:
      operationId: updateTaskStatus
      tags: [patients]
      summary: Update task status
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: taskId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateTaskStatusBody"
      responses:
        "200":
          description: Task updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PatientTask"

  /patients/{id}/notifications:
    get:
      operationId: getPatientNotifications
      tags: [patients]
      summary: List compulsory notifications for a patient
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of notifications
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PatientNotification"
    post:
      operationId: createPatientNotification
      tags: [patients]
      summary: Create a compulsory notification
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateNotificationBody"
      responses:
        "201":
          description: Notification created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PatientNotification"

  /patients/{id}/notifications/{notificationId}:
    patch:
      operationId: updatePatientNotification
      tags: [patients]
      summary: Update a compulsory notification
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: notificationId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateNotificationBody"
      responses:
        "200":
          description: Notification updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PatientNotification"
    delete:
      operationId: deletePatientNotification
      tags: [patients]
      summary: Delete a compulsory notification
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: notificationId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /patients/{id}/history:
    get:
      operationId: getPatientHistory
      tags: [patients]
      summary: Get patient evolution history
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Evolution history entries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PatientEvolution"

  /staff:
    get:
      operationId: listStaff
      tags: [staff]
      summary: List all staff members
      responses:
        "200":
          description: List of staff
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/StaffMember"
    post:
      operationId: createStaff
      tags: [staff]
      summary: Create a staff member
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateStaffBody"
      responses:
        "201":
          description: Created staff member
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StaffMember"

  /staff/{id}:
    get:
      operationId: getStaff
      tags: [staff]
      summary: Get a staff member
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Staff member
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StaffMember"
        "404":
          description: Not found
    put:
      operationId: updateStaff
      tags: [staff]
      summary: Update a staff member
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateStaffBody"
      responses:
        "200":
          description: Updated staff member
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StaffMember"
        "404":
          description: Not found
    delete:
      operationId: deleteStaff
      tags: [staff]
      summary: Delete a staff member
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    TriageStatus:
      type: string
      enum: [red, orange, yellow, green, blue]

    Patient:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        birthDate:
          type: string
        age:
          type: integer
        sex:
          type: string
          enum: [M, F, O]
        motherName:
          type: string
        cns:
          type: string
        cpf:
          type: string
        rg:
          type: string
        weight:
          type: number
        phone:
          type: string
        email:
          type: string
        guardianName:
          type: string
        street:
          type: string
        addressNumber:
          type: string
        addressComplement:
          type: string
        neighborhood:
          type: string
        city:
          type: string
        addressState:
          type: string
        zipCode:
          type: string
        bed:
          type: string
        diagnosis:
          type: string
        heartRate:
          type: integer
        respiratoryRate:
          type: integer
        glucose:
          type: number
        spO2:
          type: integer
        temperature:
          type: number
        systolicBp:
          type: integer
        diastolicBp:
          type: integer
        status:
          $ref: "#/components/schemas/TriageStatus"
        sector:
          type: string
        internmentStatus:
          type: string
          enum: [internado, nao_internado]
        nurse:
          type: string
        createdBy:
          type: string
        updatedBy:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - name
        - birthDate
        - age
        - sex
        - motherName
        - cns
        - cpf
        - rg
        - weight
        - phone
        - email
        - guardianName
        - street
        - addressNumber
        - addressComplement
        - neighborhood
        - city
        - addressState
        - zipCode
        - bed
        - diagnosis
        - heartRate
        - respiratoryRate
        - glucose
        - spO2
        - temperature
        - systolicBp
        - diastolicBp
        - status
        - sector
        - internmentStatus
        - nurse
        - createdBy
        - updatedBy
        - createdAt
        - updatedAt

    CreatePatientBody:
      type: object
      properties:
        name:
          type: string
        birthDate:
          type: string
        age:
          type: integer
        sex:
          type: string
          enum: [M, F, O]
        motherName:
          type: string
        cns:
          type: string
        cpf:
          type: string
        rg:
          type: string
        weight:
          type: number
        phone:
          type: string
        email:
          type: string
        guardianName:
          type: string
        street:
          type: string
        addressNumber:
          type: string
        addressComplement:
          type: string
        neighborhood:
          type: string
        city:
          type: string
        addressState:
          type: string
        zipCode:
          type: string
        bed:
          type: string
        diagnosis:
          type: string
        heartRate:
          type: integer
        respiratoryRate:
          type: integer
        glucose:
          type: number
        spO2:
          type: integer
        temperature:
          type: number
        systolicBp:
          type: integer
        diastolicBp:
          type: integer
        status:
          $ref: "#/components/schemas/TriageStatus"
        sector:
          type: string
        internmentStatus:
          type: string
          enum: [internado, nao_internado]
        nurse:
          type: string
      required:
        - name
        - status
        - sector
        - internmentStatus

    UpdatePatientStatusBody:
      type: object
      properties:
        status:
          $ref: "#/components/schemas/TriageStatus"
      required:
        - status

    VitalsUpdateBody:
      type: object
      properties:
        heartRate:
          type: integer
        respiratoryRate:
          type: integer
        glucose:
          type: number
        systolicBp:
          type: integer
        diastolicBp:
          type: integer
        spO2:
          type: integer
        temperature:
          type: number
        painScale:
          type: integer
        consciousnessLevel:
          type: string
        generalCondition:
          type: string
        subjective:
          type: string
        assessment:
          type: string
        plan:
          type: string
        responsible:
          type: string
        note:
          type: string
      required:
        - responsible

    PatientEvolution:
      type: object
      properties:
        id:
          type: integer
        patientId:
          type: integer
        heartRate:
          type: integer
        respiratoryRate:
          type: integer
        glucose:
          type: number
        systolicBp:
          type: integer
        diastolicBp:
          type: integer
        spO2:
          type: integer
        temperature:
          type: number
        painScale:
          type: integer
        consciousnessLevel:
          type: string
        generalCondition:
          type: string
        subjective:
          type: string
        assessment:
          type: string
        plan:
          type: string
        responsible:
          type: string
        note:
          type: string
        createdBy:
          type: string
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - patientId
        - responsible
        - note
        - subjective
        - assessment
        - plan
        - createdBy
        - createdAt

    PatientPrescription:
      type: object
      properties:
        id:
          type: integer
        patientId:
          type: integer
        items:
          type: string
        status:
          type: string
          enum: [pendente, em_andamento, concluido]
        responsible:
          type: string
        scheduledTime:
          type: string
        notes:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - patientId
        - items
        - status
        - responsible
        - scheduledTime
        - notes
        - createdAt
        - updatedAt

    CreatePrescriptionBody:
      type: object
      properties:
        items:
          type: string
        status:
          type: string
          enum: [pendente, em_andamento, concluido]
        responsible:
          type: string
        scheduledTime:
          type: string
        notes:
          type: string
      required:
        - items
        - responsible

    UpdatePrescriptionStatusBody:
      type: object
      properties:
        status:
          type: string
          enum: [pendente, em_andamento, concluido]
        responsible:
          type: string
        scheduledTime:
          type: string
      required:
        - status

    PatientTask:
      type: object
      properties:
        id:
          type: integer
        patientId:
          type: integer
        items:
          type: string
        status:
          type: string
          enum: [pendente, em_andamento, concluido]
        responsible:
          type: string
        notes:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - patientId
        - items
        - status
        - responsible
        - notes
        - createdAt
        - updatedAt

    CreateTaskBody:
      type: object
      properties:
        items:
          type: string
        status:
          type: string
          enum: [pendente, em_andamento, concluido]
        responsible:
          type: string
        notes:
          type: string
      required:
        - items
        - responsible

    UpdateTaskStatusBody:
      type: object
      properties:
        status:
          type: string
          enum: [pendente, em_andamento, concluido]
      required:
        - status

    PatientsSummary:
      type: object
      properties:
        total:
          type: integer
        red:
          type: integer
        orange:
          type: integer
        yellow:
          type: integer
        green:
          type: integer
        blue:
          type: integer
      required:
        - total
        - red
        - orange
        - yellow
        - green
        - blue

    StaffMember:
      type: object
      properties:
        id:
          type: integer
        fullName:
          type: string
        category:
          type: string
          enum: [tecnico, enfermeiro, medico]
        corenCrm:
          type: string
        sector:
          type: string
        login:
          type: string
        accessLevels:
          type: string
        signature:
          type: string
        stamp:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - fullName
        - category
        - corenCrm
        - sector
        - login
        - accessLevels
        - signature
        - stamp
        - createdAt
        - updatedAt

    CreateStaffBody:
      type: object
      properties:
        fullName:
          type: string
        category:
          type: string
          enum: [tecnico, enfermeiro, medico]
        corenCrm:
          type: string
        sector:
          type: string
        login:
          type: string
        password:
          type: string
        accessLevels:
          type: string
        signature:
          type: string
        stamp:
          type: string
      required:
        - fullName
        - category
        - login
        - password

    UpdateStaffBody:
      type: object
      properties:
        fullName:
          type: string
        category:
          type: string
          enum: [tecnico, enfermeiro, medico]
        corenCrm:
          type: string
        sector:
          type: string
        login:
          type: string
        password:
          type: string
        accessLevels:
          type: string
        signature:
          type: string
        stamp:
          type: string

    GetStaffParams:
      type: object
      properties:
        id:
          type: integer
      required:
        - id

    UpdateStaffParams:
      type: object
      properties:
        id:
          type: integer
      required:
        - id

    DeleteStaffParams:
      type: object
      properties:
        id:
          type: integer
      required:
        - id

    PatientNotification:
      type: object
      properties:
        id:
          type: integer
        patientId:
          type: integer
        types:
          type: string
        otherType:
          type: string
        diagnosis:
          type: string
        symptomOnsetDate:
          type: string
        situation:
          type: string
          enum: [notificado, pendente]
        responsible:
          type: string
        notifiedAt:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - patientId
        - types
        - otherType
        - diagnosis
        - symptomOnsetDate
        - situation
        - responsible
        - notifiedAt
        - createdAt
        - updatedAt

    CreateNotificationBody:
      type: object
      properties:
        types:
          type: string
        otherType:
          type: string
        diagnosis:
          type: string
        symptomOnsetDate:
          type: string
        situation:
          type: string
          enum: [notificado, pendente]
        responsible:
          type: string
        notifiedAt:
          type: string
      required:
        - types
        - situation
        - responsible

    UpdateNotificationBody:
      type: object
      properties:
        types:
          type: string
        otherType:
          type: string
        diagnosis:
          type: string
        symptomOnsetDate:
          type: string
        situation:
          type: string
          enum: [notificado, pendente]
        responsible:
          type: string
        notifiedAt:
          type: string

    GetNotificationParams:
      type: object
      properties:
        id:
          type: integer
        notificationId:
          type: integer
      required:
        - id
        - notificationId
