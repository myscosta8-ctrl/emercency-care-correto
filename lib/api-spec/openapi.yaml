openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: UPA Patient Management API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: patients
    description: Patient operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /patients:
    get:
      operationId: listPatients
      tags: [patients]
      summary: List all patients
      responses:
        "200":
          description: List of patients
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Patient"
    post:
      operationId: createPatient
      tags: [patients]
      summary: Create a new patient
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePatientBody"
      responses:
        "201":
          description: Created patient
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Patient"

  /patients/summary:
    get:
      operationId: getPatientsSummary
      tags: [patients]
      summary: Get dashboard summary counts by Manchester triage
      responses:
        "200":
          description: Patient summary stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PatientsSummary"

  /patients/{id}:
    get:
      operationId: getPatient
      tags: [patients]
      summary: Get a single patient
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Patient
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Patient"
        "404":
          description: Not found
    put:
      operationId: updatePatient
      tags: [patients]
      summary: Update a patient
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePatientBody"
      responses:
        "200":
          description: Updated patient
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Patient"
        "404":
          description: Not found
    delete:
      operationId: deletePatient
      tags: [patients]
      summary: Delete a patient
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /patients/{id}/status:
    patch:
      operationId: updatePatientStatus
      tags: [patients]
      summary: Quickly update only the patient triage status
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdatePatientStatusBody"
      responses:
        "200":
          description: Updated patient
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Patient"
        "404":
          description: Not found

  /patients/{id}/vitals:
    post:
      operationId: addVitals
      tags: [patients]
      summary: Update patient vitals and log evolution entry
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VitalsUpdateBody"
      responses:
        "200":
          description: Updated patient
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Patient"
        "404":
          description: Not found

  /patients/{id}/prescriptions:
    get:
      operationId: getPatientPrescriptions
      tags: [patients]
      summary: Get patient prescriptions
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Prescription list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PatientPrescription"
    post:
      operationId: createPatientPrescription
      tags: [patients]
      summary: Create a nursing prescription
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePrescriptionBody"
      responses:
        "201":
          description: Prescription created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PatientPrescription"

  /patients/{id}/prescriptions/{prescriptionId}:
    patch:
      operationId: updatePrescriptionStatus
      tags: [patients]
      summary: Update prescription status
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: prescriptionId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdatePrescriptionStatusBody"
      responses:
        "200":
          description: Prescription updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PatientPrescription"

  /patients/{id}/history:
    get:
      operationId: getPatientHistory
      tags: [patients]
      summary: Get patient evolution history
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Evolution history entries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PatientEvolution"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    TriageStatus:
      type: string
      enum: [red, orange, yellow, green, blue]

    Patient:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        age:
          type: integer
        bed:
          type: string
        diagnosis:
          type: string
        heartRate:
          type: integer
        respiratoryRate:
          type: integer
        glucose:
          type: number
        spO2:
          type: integer
        temperature:
          type: number
        systolicBp:
          type: integer
        diastolicBp:
          type: integer
        status:
          $ref: "#/components/schemas/TriageStatus"
        sector:
          type: string
        nurse:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - name
        - age
        - bed
        - diagnosis
        - heartRate
        - respiratoryRate
        - glucose
        - spO2
        - temperature
        - systolicBp
        - diastolicBp
        - status
        - sector
        - nurse
        - createdAt
        - updatedAt

    CreatePatientBody:
      type: object
      properties:
        name:
          type: string
        age:
          type: integer
        bed:
          type: string
        diagnosis:
          type: string
        heartRate:
          type: integer
        respiratoryRate:
          type: integer
        glucose:
          type: number
        spO2:
          type: integer
        temperature:
          type: number
        systolicBp:
          type: integer
        diastolicBp:
          type: integer
        status:
          $ref: "#/components/schemas/TriageStatus"
        sector:
          type: string
        nurse:
          type: string
      required:
        - name
        - age
        - status
        - sector

    UpdatePatientStatusBody:
      type: object
      properties:
        status:
          $ref: "#/components/schemas/TriageStatus"
      required:
        - status

    VitalsUpdateBody:
      type: object
      properties:
        heartRate:
          type: integer
        respiratoryRate:
          type: integer
        glucose:
          type: number
        systolicBp:
          type: integer
        diastolicBp:
          type: integer
        spO2:
          type: integer
        temperature:
          type: number
        painScale:
          type: integer
        consciousnessLevel:
          type: string
        generalCondition:
          type: string
        subjective:
          type: string
        assessment:
          type: string
        plan:
          type: string
        responsible:
          type: string
        note:
          type: string
      required:
        - responsible

    PatientEvolution:
      type: object
      properties:
        id:
          type: integer
        patientId:
          type: integer
        heartRate:
          type: integer
        respiratoryRate:
          type: integer
        glucose:
          type: number
        systolicBp:
          type: integer
        diastolicBp:
          type: integer
        spO2:
          type: integer
        temperature:
          type: number
        painScale:
          type: integer
        consciousnessLevel:
          type: string
        generalCondition:
          type: string
        subjective:
          type: string
        assessment:
          type: string
        plan:
          type: string
        responsible:
          type: string
        note:
          type: string
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - patientId
        - responsible
        - note
        - subjective
        - assessment
        - plan
        - createdAt

    PatientPrescription:
      type: object
      properties:
        id:
          type: integer
        patientId:
          type: integer
        items:
          type: string
        status:
          type: string
          enum: [pendente, em_andamento, concluido]
        responsible:
          type: string
        scheduledTime:
          type: string
        notes:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - patientId
        - items
        - status
        - responsible
        - scheduledTime
        - notes
        - createdAt
        - updatedAt

    CreatePrescriptionBody:
      type: object
      properties:
        items:
          type: string
        status:
          type: string
          enum: [pendente, em_andamento, concluido]
        responsible:
          type: string
        scheduledTime:
          type: string
        notes:
          type: string
      required:
        - items
        - responsible

    UpdatePrescriptionStatusBody:
      type: object
      properties:
        status:
          type: string
          enum: [pendente, em_andamento, concluido]
        responsible:
          type: string
        scheduledTime:
          type: string
      required:
        - status

    PatientsSummary:
      type: object
      properties:
        total:
          type: integer
        red:
          type: integer
        orange:
          type: integer
        yellow:
          type: integer
        green:
          type: integer
        blue:
          type: integer
      required:
        - total
        - red
        - orange
        - yellow
        - green
        - blue
