openapi: 3.0.0
info:
  title: UPA Patient Management API
  version: 1.0.0

paths:
  /api/healthz:
    get:
      operationId: healthCheck
      summary: Health check
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                required:
                  - status

  /api/patients:
    get:
      operationId: listPatients
      summary: List all patients
      responses:
        "200":
          description: List of patients
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Patient"
    post:
      operationId: createPatient
      summary: Create a new patient
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePatientBody"
      responses:
        "201":
          description: Created patient
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Patient"

  /api/patients/summary:
    get:
      operationId: getPatientsSummary
      summary: Get patient summary stats
      responses:
        "200":
          description: Summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PatientSummary"

  /api/patients/{id}:
    get:
      operationId: getPatient
      summary: Get a patient by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Patient
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Patient"
        "404":
          description: Not found
    put:
      operationId: updatePatient
      summary: Update a patient
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdatePatientBody"
      responses:
        "200":
          description: Updated patient
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Patient"
        "404":
          description: Not found
    delete:
      operationId: deletePatient
      summary: Delete a patient
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found

  /api/patients/{id}/status:
    put:
      operationId: updatePatientStatus
      summary: Update patient triage status
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdatePatientStatusBody"
      responses:
        "200":
          description: Updated patient
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Patient"
        "404":
          description: Not found

  /api/patients/{id}/history:
    get:
      operationId: getPatientHistory
      summary: Get patient history entries
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: History entries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PatientHistoryEntry"
    post:
      operationId: addPatientHistory
      summary: Add a patient history entry
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddPatientHistoryBody"
      responses:
        "201":
          description: Created history entry
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PatientHistoryEntry"

  /api/patients/{id}/vitals:
    post:
      operationId: recordPatientVitals
      summary: Record patient vitals
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RecordPatientVitalsBody"
      responses:
        "201":
          description: Created vitals record
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Patient"

  /api/patients/{id}/prescriptions:
    get:
      operationId: getPatientPrescriptions
      summary: Get patient prescriptions
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Prescriptions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PatientPrescription"
    post:
      operationId: addPatientPrescription
      summary: Add a prescription
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddPatientPrescriptionBody"
      responses:
        "201":
          description: Created prescription
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PatientPrescription"

  /api/patients/{id}/prescriptions/{prescriptionId}/status:
    put:
      operationId: updatePrescriptionStatus
      summary: Update prescription status
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: prescriptionId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdatePrescriptionStatusBody"
      responses:
        "200":
          description: Updated prescription
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PatientPrescription"

  /api/patients/{id}/tasks:
    get:
      operationId: getPatientTasks
      summary: Get patient tasks
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Tasks
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PatientTask"
    post:
      operationId: addPatientTask
      summary: Add a task
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddPatientTaskBody"
      responses:
        "201":
          description: Created task
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PatientTask"

  /api/patients/{id}/tasks/{taskId}/status:
    put:
      operationId: updateTaskStatus
      summary: Update task status
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: taskId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateTaskStatusBody"
      responses:
        "200":
          description: Updated task
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PatientTask"

  /api/patients/{id}/notifications:
    get:
      operationId: getPatientNotifications
      summary: Get patient compulsory notifications
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Notifications
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PatientNotification"
    post:
      operationId: addPatientNotification
      summary: Add a compulsory notification
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddPatientNotificationBody"
      responses:
        "201":
          description: Created notification
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PatientNotification"

  /api/patients/{id}/notifications/{notificationId}:
    put:
      operationId: updatePatientNotification
      summary: Update a compulsory notification
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: notificationId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdatePatientNotificationBody"
      responses:
        "200":
          description: Updated notification
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PatientNotification"
    delete:
      operationId: deletePatientNotification
      summary: Delete a compulsory notification
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: notificationId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /api/notifications:
    post:
      operationId: createSinanNotification
      summary: Create a SINAN notification (auto-fills from patient)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSinanNotificationBody"
      responses:
        "201":
          description: Created notification with patient data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SinanNotificationWithPatient"
        "404":
          description: Patient not found

  /api/notifications/{id}:
    get:
      operationId: getSinanNotification
      summary: Get a SINAN notification with patient data
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Notification with patient data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SinanNotificationWithPatient"
        "404":
          description: Not found

  /api/audit:
    get:
      operationId: listAuditLogs
      summary: List audit log entries
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: List of audit log entries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AuditLog"
    post:
      operationId: createAuditLog
      summary: Create an audit log entry
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAuditLogBody"
      responses:
        "201":
          description: Created audit log entry
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuditLog"

  /api/staff:
    get:
      operationId: listStaff
      summary: List all staff members
      responses:
        "200":
          description: Staff list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/StaffMember"
    post:
      operationId: createStaff
      summary: Create a staff member
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateStaffBody"
      responses:
        "201":
          description: Created staff member
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StaffMember"

  /api/staff/{id}:
    get:
      operationId: getStaff
      summary: Get a staff member by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Staff member
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StaffMember"
        "404":
          description: Not found
    put:
      operationId: updateStaff
      summary: Update a staff member
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateStaffBody"
      responses:
        "200":
          description: Updated staff member
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StaffMember"
        "404":
          description: Not found
    delete:
      operationId: deleteStaff
      summary: Delete a staff member
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found

components:
  schemas:
    Patient:
      type: object
      properties:
        id:
          type: integer
        nome:
          type: string
        birthDate:
          type: string
        age:
          type: integer
        sex:
          type: string
        motherName:
          type: string
        cns:
          type: string
        cpf:
          type: string
        rg:
          type: string
        phone:
          type: string
        email:
          type: string
        street:
          type: string
        addressNumber:
          type: string
        addressComplement:
          type: string
        neighborhood:
          type: string
        city:
          type: string
        addressState:
          type: string
        zipCode:
          type: string
        weight:
          type: number
        height:
          type: number
        symptoms:
          type: string
        symptomOnsetDate:
          type: string
        diagnosis:
          type: string
        status:
          type: string
          enum: [red, orange, yellow, green, blue]
        bed:
          type: string
        setor:
          type: string
          enum: [sala_vermelha, observacao_adulto, observacao_pediatrica, observacao_pre_adulto]
        internmentStatus:
          type: string
          enum: [observacao, internado, alta]
        nurse:
          type: string
        responsibleProfessional:
          type: string
        attendanceDate:
          type: string
        attendanceTime:
          type: string
        healthUnit:
          type: string
        agravo:
          type: string
        dataNotificacao:
          type: string
        municipioNotificacao:
          type: string
        codigoIbge:
          type: string
        evolucaoCaso:
          type: string
        classificacaoFinal:
          type: string
        criterioConfirmacao:
          type: string
        guardianName:
          type: string
        systolicBp:
          type: number
        diastolicBp:
          type: number
        heartRate:
          type: number
        respiratoryRate:
          type: number
        spO2:
          type: number
        temperature:
          type: number
        glucose:
          type: number
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - nome
        - birthDate
        - age
        - sex
        - motherName
        - cns
        - cpf
        - rg
        - phone
        - email
        - street
        - addressNumber
        - addressComplement
        - neighborhood
        - city
        - addressState
        - zipCode
        - weight
        - height
        - symptoms
        - symptomOnsetDate
        - diagnosis
        - status
        - bed
        - setor
        - internmentStatus
        - nurse
        - responsibleProfessional
        - attendanceDate
        - attendanceTime
        - healthUnit
        - agravo
        - dataNotificacao
        - municipioNotificacao
        - codigoIbge
        - evolucaoCaso
        - classificacaoFinal
        - criterioConfirmacao
        - guardianName
        - systolicBp
        - diastolicBp
        - heartRate
        - respiratoryRate
        - spO2
        - temperature
        - glucose
        - createdAt
        - updatedAt

