openapi: 3.0.0
info:
  title: UPA Patient Management API
  version: 1.0.0

paths:
  /api/healthz:
    get:
      operationId: healthCheck
      summary: Health check
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                required:
                  - status

  /api/patients:
    get:
      operationId: listPatients
      summary: List all patients
      parameters:
        - name: exam
          in: query
          required: false
          schema:
            type: string
          description: Filter patients who have a pending exam matching this name
        - name: examType
          in: query
          required: false
          schema:
            type: string
            enum: [laboratorial, imagem]
          description: Filter by exam type
        - name: examStatus
          in: query
          required: false
          schema:
            type: string
            enum: [solicitado, coletado, laudado]
          description: Filter by exam request status
        - name: examPriority
          in: query
          required: false
          schema:
            type: string
            enum: [urgente, rotina, eletivo]
          description: Filter by exam request priority
      responses:
        "200":
          description: List of patients
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Patient"
    post:
      operationId: createPatient
      summary: Create a new patient
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePatientBody"
      responses:
        "201":
          description: Created patient
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Patient"

  /api/patients/lookup:
    get:
      operationId: lookupPatients
      summary: Search patients by name, CPF or CNS (all records including archived)
      parameters:
        - name: q
          in: query
          required: false
          schema:
            type: string
          description: Search term (name, CPF digits, CNS, or birth date)
      responses:
        "200":
          description: List of matching patients
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Patient"

  /api/patients/summary:
    get:
      operationId: getPatientsSummary
      summary: Get patient summary stats
      responses:
        "200":
          description: Summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PatientSummary"

  /api/patients/{id}:
    get:
      operationId: getPatient
      summary: Get a patient by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Patient
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Patient"
        "404":
          description: Not found
    put:
      operationId: updatePatient
      summary: Update a patient
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdatePatientBody"
      responses:
        "200":
          description: Updated patient
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Patient"
        "404":
          description: Not found
    delete:
      operationId: deletePatient
      summary: Delete a patient
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found

  /api/patients/{id}/status:
    put:
      operationId: updatePatientStatus
      summary: Update patient triage status
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdatePatientStatusBody"
      responses:
        "200":
          description: Updated patient
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Patient"
        "404":
          description: Not found

  /api/patients/{id}/history:
    get:
      operationId: getPatientHistory
      summary: Get patient history entries
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: History entries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PatientHistoryEntry"
    post:
      operationId: addPatientHistory
      summary: Add a patient history entry
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddPatientHistoryBody"
      responses:
        "201":
          description: Created history entry
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PatientHistoryEntry"

  /api/patients/{id}/vitals:
    get:
      operationId: getPatientVitals
      summary: Get patient vitals history
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Vitals history
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Vitals'
    post:
      operationId: recordPatientVitals
      summary: Record patient vitals
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RecordPatientVitalsBody"
      responses:
        "201":
          description: Created vitals record
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Patient"

  /api/patients/{id}/prescriptions:
    get:
      operationId: getPatientPrescriptions
      summary: Get patient prescriptions
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Prescriptions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PatientPrescription"
    post:
      operationId: addPatientPrescription
      summary: Add a prescription
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddPatientPrescriptionBody"
      responses:
        "201":
          description: Created prescription
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PatientPrescription"

  /api/patients/{id}/prescriptions/{prescriptionId}/status:
    put:
      operationId: updatePrescriptionStatus
      summary: Update prescription status
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: prescriptionId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdatePrescriptionStatusBody"
      responses:
        "200":
          description: Updated prescription
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PatientPrescription"

  /api/patients/{id}/tasks:
    get:
      operationId: getPatientTasks
      summary: Get patient tasks
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Tasks
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PatientTask"
    post:
      operationId: addPatientTask
      summary: Add a task
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddPatientTaskBody"
      responses:
        "201":
          description: Created task
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PatientTask"

  /api/patients/{id}/tasks/{taskId}/status:
    put:
      operationId: updateTaskStatus
      summary: Update task status
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: taskId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateTaskStatusBody"
      responses:
        "200":
          description: Updated task
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PatientTask"

  /api/patients/{id}/notifications:
    get:
      operationId: getPatientNotifications
      summary: Get patient compulsory notifications
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Notifications
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PatientNotification"
    post:
      operationId: addPatientNotification
      summary: Add a compulsory notification
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddPatientNotificationBody"
      responses:
        "201":
          description: Created notification
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PatientNotification"

  /api/patients/{id}/notifications/{notificationId}:
    put:
      operationId: updatePatientNotification
      summary: Update a compulsory notification
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: notificationId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdatePatientNotificationBody"
      responses:
        "200":
          description: Updated notification
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PatientNotification"
    delete:
      operationId: deletePatientNotification
      summary: Delete a compulsory notification
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: notificationId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /api/patients/{id}/devices:
    get:
      operationId: getPatientDevices
      summary: List patient devices
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: active
          in: query
          required: false
          schema:
            type: boolean
      responses:
        "200":
          description: List of devices
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PatientDevice"
    post:
      operationId: addPatientDevice
      summary: Add a device to patient
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddPatientDeviceBody"
      responses:
        "201":
          description: Created device
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PatientDevice"

  /api/patients/{id}/devices/{deviceId}:
    put:
      operationId: updatePatientDevice
      summary: Update a patient device (e.g. mark as removed)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: deviceId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdatePatientDeviceBody"
      responses:
        "200":
          description: Updated device
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PatientDevice"
    delete:
      operationId: deletePatientDevice
      summary: Delete a patient device record
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: deviceId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /api/auth/login:
    post:
      operationId: authLogin
      summary: Authenticate a staff member
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginBody"
      responses:
        "200":
          description: Authenticated user info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthUser"
        "401":
          description: Invalid credentials

  /api/auth/change-password:
    post:
      operationId: changePassword
      summary: Change the authenticated user's password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChangePasswordBody"
      responses:
        "200":
          description: Password changed successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                required:
                  - ok
        "400":
          description: Invalid request
        "401":
          description: Unauthorized

  /api/patients/{id}/social-notes:
    get:
      operationId: getPatientSocialNotes
      summary: Get social notes for a patient
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Social notes
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SocialNote"
    post:
      operationId: addPatientSocialNote
      summary: Add a social note for a patient
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddSocialNoteBody"
      responses:
        "201":
          description: Created social note
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SocialNote"

  /api/patients/{id}/nutritional-assessments:
    get:
      operationId: getPatientNutritionalAssessments
      summary: Get nutritional assessments for a patient
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Nutritional assessments
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/NutritionalAssessment"
    post:
      operationId: addPatientNutritionalAssessment
      summary: Add a nutritional assessment for a patient
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddNutritionalAssessmentBody"
      responses:
        "201":
          description: Created nutritional assessment
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NutritionalAssessment"

  /api/patients/{id}/pharmacy-entries:
    get:
      operationId: getPatientPharmacyEntries
      summary: Get pharmacy entries for a patient
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Pharmacy entries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PharmacyEntry"
    post:
      operationId: addPatientPharmacyEntry
      summary: Add a pharmacy entry for a patient
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddPharmacyEntryBody"
      responses:
        "201":
          description: Created pharmacy entry
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PharmacyEntry"

  /api/patients/{id}/pharmacy-entries/{entryId}/status:
    patch:
      operationId: updatePharmacyEntryStatus
      summary: Update pharmacy entry status
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: entryId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdatePharmacyEntryStatusBody"
      responses:
        "200":
          description: Updated pharmacy entry
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PharmacyEntry"

  /api/patients/{id}/transfers:
    get:
      operationId: getPatientTransfers
      summary: List transfers for a patient
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of transfers
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Transfer"
    post:
      operationId: addPatientTransfer
      summary: Create a transfer record
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTransferBody"
      responses:
        "201":
          description: Created transfer
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Transfer"

  /api/patients/{id}/transfers/{transferId}:
    patch:
      operationId: updatePatientTransfer
      summary: Update a transfer record
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: transferId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateTransferBody"
      responses:
        "200":
          description: Updated transfer
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Transfer"

  /api/exam-requests:
    get:
      operationId: listExamRequests
      summary: List all exam requests across all patients
      parameters:
        - name: status
          in: query
          required: false
          schema:
            type: string
            enum: [solicitado, coletado, laudado, all]
          description: Filter by exam request status. Defaults to open pendencies only (excludes laudado). Pass "all" to include laudado.
        - name: priority
          in: query
          required: false
          schema:
            type: string
            enum: [urgente, rotina, eletivo]
          description: Filter by exam request priority
      responses:
        "200":
          description: List of exam requests with patient info
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/GlobalExamRequest"

  /api/patients/{id}/exam-requests:
    get:
      operationId: getPatientExamRequests
      summary: Get exam requests for a patient
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Exam requests
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ExamRequest"
    post:
      operationId: addPatientExamRequest
      summary: Add an exam request for a patient
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddExamRequestBody"
      responses:
        "201":
          description: Created exam request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExamRequest"

  /api/patients/{id}/exam-requests/{examRequestId}/status:
    patch:
      operationId: updateExamRequestStatus
      summary: Update exam request status
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: examRequestId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateExamRequestStatusBody"
      responses:
        "200":
          description: Updated exam request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExamRequest"
        "404":
          description: Not found

  /api/notifications:
    post:
      operationId: createSinanNotification
      summary: Create a SINAN notification (auto-fills from patient)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSinanNotificationBody"
      responses:
        "201":
          description: Created notification with patient data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SinanNotificationWithPatient"
        "404":
          description: Patient not found

  /api/notifications/{id}:
    get:
      operationId: getSinanNotification
      summary: Get a SINAN notification with patient data
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Notification with patient data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SinanNotificationWithPatient"
        "404":
          description: Not found

  /api/audit:
    get:
      operationId: listAuditLogs
      summary: List audit log entries
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: List of audit log entries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AuditLog"
    post:
      operationId: createAuditLog
      summary: Create an audit log entry
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAuditLogBody"
      responses:
        "201":
          description: Created audit log entry
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuditLog"

  /api/staff:
    get:
      operationId: listStaff
      summary: List all staff members
      responses:
        "200":
          description: Staff list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/StaffMember"
    post:
      operationId: createStaff
      summary: Create a staff member
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateStaffBody"
      responses:
        "201":
          description: Created staff member
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StaffMember"

  /api/staff/{id}:
    get:
      operationId: getStaff
      summary: Get a staff member by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Staff member
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StaffMember"
        "404":
          description: Not found
    put:
      operationId: updateStaff
      summary: Update a staff member
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateStaffBody"
      responses:
        "200":
          description: Updated staff member
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StaffMember"
        "404":
          description: Not found
    delete:
      operationId: deleteStaff
      summary: Delete a staff member
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found

  /api/patients/{id}/exam-results:
    get:
      operationId: getPatientExamResults
      summary: Get patient exam results
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Exam results
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ExamResult"
    post:
      operationId: createExamResult
      summary: Create an exam result (pending)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateExamResultBody"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExamResult"

  /api/patients/{id}/exam-results/{examId}/liberar:
    put:
      operationId: liberarExamResult
      summary: Release exam result with data
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: examId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                resultText:
                  type: string
                fileData:
                  type: string
                fileName:
                  type: string
                fileMime:
                  type: string
      responses:
        "200":
          description: Released
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExamResult"

  /api/patients/{id}/alerts:
    get:
      operationId: getPatientAlerts
      summary: List clinical alerts for a patient
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of alerts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PatientAlert"
    post:
      operationId: createPatientAlert
      summary: Create a clinical alert for a patient
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePatientAlertBody"
      responses:
        "201":
          description: Created alert
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PatientAlert"

  /api/patients/{id}/alerts/{alertId}/deactivate:
    patch:
      operationId: deactivatePatientAlert
      summary: Deactivate a clinical alert
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: alertId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DeactivatePatientAlertBody"
      responses:
        "200":
          description: Deactivated alert
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PatientAlert"

  /api/patients/{id}/exam-results/{examId}/notified:
    put:
      operationId: markExamNotified
      summary: Mark exam as notified (alert dismissed)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: examId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Marked
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExamResult"

