        glucose:
          type: number
        systolicBp:
          type: integer
        diastolicBp:
          type: integer
        spO2:
          type: integer
        temperature:
          type: number
        painScale:
          type: integer
        consciousnessLevel:
          type: string
        generalCondition:
          type: string
        subjective:
          type: string
        assessment:
          type: string
        plan:
          type: string
        responsible:
          type: string
        note:
          type: string
        createdBy:
          type: string
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - patientId
        - subjective
        - assessment
        - plan
        - responsible
        - note
        - createdBy
        - createdAt

    AddPatientHistoryBody:
      type: object
      properties:
        note:
          type: string
        author:
          type: string
      required:
        - note
        - author

    RecordPatientVitalsBody:
      type: object
      properties:
        systolicBp:
          type: number
        diastolicBp:
          type: number
        heartRate:
          type: number
        respiratoryRate:
          type: number
        spO2:
          type: number
        temperature:
          type: number
        glucose:
          type: number
        painScale:
          type: integer
        consciousnessLevel:
          type: string
        generalCondition:
          type: string
        subjective:
          type: string
        assessment:
          type: string
        plan:
          type: string
        responsible:
          type: string
        note:
          type: string
      required:
        - responsible

    PatientPrescription:
      type: object
      properties:
        id:
          type: integer
        patientId:
          type: integer
        items:
          type: string
        status:
          type: string
          enum: [pendente, em_andamento, concluido]
        responsible:
          type: string
        scheduledTime:
          type: string
        notes:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - patientId
        - items
        - status
        - responsible
        - scheduledTime
        - notes
        - createdAt
        - updatedAt

    AddPatientPrescriptionBody:
      type: object
      properties:
        items:
          type: string
        responsible:
          type: string
        scheduledTime:
          type: string
        notes:
          type: string
      required:
        - items
        - responsible

    UpdatePrescriptionStatusBody:
      type: object
      properties:
        status:
          type: string
          enum: [pendente, em_andamento, concluido]
        responsible:
          type: string
        scheduledTime:
          type: string
      required:
        - status

    PatientTask:
      type: object
      properties:
        id:
          type: integer
        patientId:
          type: integer
        items:
          type: string
        status:
          type: string
          enum: [pendente, em_andamento, concluido]
        responsible:
          type: string
        notes:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - patientId
        - items
        - status
        - responsible
        - notes
        - createdAt
        - updatedAt

    AddPatientTaskBody:
      type: object
      properties:
        items:
          type: string
        responsible:
          type: string
        notes:
          type: string
      required:
        - items
        - responsible

    UpdateTaskStatusBody:
      type: object
      properties:
        status:
          type: string
          enum: [pendente, em_andamento, concluido]
        responsible:
          type: string
      required:
        - status

    PatientNotification:
      type: object
      properties:
        id:
          type: integer
        patientId:
          type: integer
        types:
          type: string
        otherType:
          type: string
        diagnosis:
          type: string
        symptomOnsetDate:
          type: string
        situation:
          type: string
          enum: [pendente, notificado]
        notifiedAt:
          type: string
        responsible:
          type: string
        notes:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - patientId
        - types
        - otherType
        - diagnosis
        - symptomOnsetDate
        - situation
        - notifiedAt
        - responsible
        - notes
        - createdAt
        - updatedAt

    AddPatientNotificationBody:
      type: object
      properties:
        types:
